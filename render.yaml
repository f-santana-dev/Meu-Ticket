services:
  - type: web
    name: meu-ticket
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py bootstrap_admin
    startCommand: gunicorn MeuTicket.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "meu-ticket.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://meu-ticket.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: meu-ticket-db
          property: connectionString
      - key: DJANGO_LOG_LEVEL
        value: "INFO"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SERVE_MEDIA_IN_PROD
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: AUTO_CREATE_ADMIN
        value: "False"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NOME
        sync: false
      - key: ADMIN_CPF
        sync: false

databases:
  - name: meu-ticket-db
    databaseName: meuticket
    user: meuticket_user
